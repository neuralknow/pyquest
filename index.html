<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>PyQuest — A Python Tutorial RPG</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IM+Fell+English:ital@0;1&family=IM+Fell+English+SC&family=Crimson+Pro:ital,wght@0,400;0,500;0,600;1,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

<style>
  :root {
    /* defaults — Forest theme; overridden by JS when Midnight toggle is on */
    --parchment: #e6e8da;
    --parchment-deep: #d3d8c0;
    --vellum: #f0f2e3;
    --ink: #1f2a20;
    --ink-70: #465543;
    --ink-50: #728471;
    --ink-30: #a3b39e;
    --wax: #9d4034;
    --moss: #365e3f;
    --royal: #384c6b;
    --gold: #b59238;
    --font-scale: 1;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;
    background: var(--parchment);
    color: var(--ink);
    font-family: 'Crimson Pro', Georgia, serif;
    font-size: calc(16px * var(--font-scale));
    min-height: 100vh;
  }
  /* Subtle parchment texture using overlapping radial-gradients */
  body::before {
    content: "";
    position: fixed; inset: 0;
    pointer-events: none;
    z-index: 0;
    background-image:
      radial-gradient(ellipse at 20% 30%, rgba(168,134,80,.15), transparent 50%),
      radial-gradient(ellipse at 80% 70%, rgba(120,80,40,.10), transparent 55%),
      radial-gradient(ellipse at 50% 100%, rgba(43,29,16,.15), transparent 50%);
    mix-blend-mode: multiply;
    opacity: .6;
  }
  /* Faint horizontal lines like a ruled scroll */
  body::after {
    content: "";
    position: fixed; inset: 0;
    pointer-events: none;
    z-index: 0;
    background-image: repeating-linear-gradient(
      0deg,
      transparent 0px, transparent 31px,
      rgba(43,29,16,.025) 31px, rgba(43,29,16,.025) 32px
    );
  }
  #root { position: relative; z-index: 1; min-height: 100vh; }
  button:focus-visible, input:focus-visible, textarea:focus-visible {
    outline: 2px dashed var(--ink-50);
    outline-offset: 2px;
  }
  ::selection { background: rgba(200,162,73,.5); color: var(--ink); }
  /* Code blocks adopt theme */
  pre, code { color: var(--ink); }

  /* Tweaks panel: lower opacity backdrop on dark theme so it's still readable */
  .twk-panel { font-family: 'Crimson Pro', sans-serif !important; }

  /* Reduce motion respect */
  @media (prefers-reduced-motion: reduce) {
    * { animation-duration: 0s !important; transition-duration: 0s !important; }
  }

  /* ---------- Responsive layout ---------- */
  /* Two-column page: main + 320px sidebar. Collapses to one column on narrow viewports. */
  .pq-twocol {
    display: grid;
    grid-template-columns: 1fr 320px;
    gap: 24px;
    max-width: 1280px;
    margin: 0 auto;
  }
  .pq-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 24px;
    margin: 0 auto 24px;
    max-width: 1280px;
  }
  .pq-page {
    min-height: 100vh;
    padding: 30px 30px 60px;
  }
  /* Tablets and below: stack into a single column, sidebar drops underneath. */
  @media (max-width: 1000px) {
    .pq-twocol { grid-template-columns: 1fr; gap: 16px; }
    .pq-header { flex-direction: column; align-items: flex-start; gap: 12px; }
    .pq-page { padding: 20px 16px 50px; }
    .pq-header-actions { align-items: flex-start !important; }
  }
  /* Phones: shrink padding more, smaller typography on big titles. */
  @media (max-width: 640px) {
    .pq-page { padding: 14px 12px 40px; }
    .pq-title-big { font-size: 26px !important; }
    .pq-title-mid { font-size: 22px !important; }
    .pq-tweaks-btn { display: none; } /* Tweaks toolbar handles it on mobile */
    /* Map zoom + minimap controls intrude on tiny screens */
    .pq-map-minimap { display: none !important; }
    /* Class picker on title scene + victory stats grid: stack vertically */
    .pq-title-classgrid { grid-template-columns: 1fr !important; }
    .pq-victory-stats { grid-template-columns: repeat(3, 1fr) !important; }
    .pq-victory-deeds { grid-template-columns: 1fr !important; }
  }
</style>
</head>
<body>
<div id="root">
  <div style="padding: 80px 30px; text-align: center; font-family: 'IM Fell English SC', serif; color: #1f2a20;">
    <div style="font-size: 28px; margin-bottom: 12px;">Unfurling the scroll…</div>
    <div style="font-family: 'Crimson Pro', serif; font-style: italic; color: #465543;">If this lingers, your browser may be blocking scripts.</div>
  </div>
</div>

<!-- React + Babel pinned, with integrity -->
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<!-- D3 v7 -->
<script src="https://unpkg.com/d3@7.8.5/dist/d3.min.js"></script>

<!-- Game pieces -->
<script type="text/babel" src="src/config.jsx"></script>
<script type="text/babel" src="src/game-state.jsx"></script>
<script type="text/babel" src="src/levels.jsx"></script>

<!-- Components -->
<script type="text/babel" src="src/components/icons.jsx"></script>
<script type="text/babel" src="src/components/scroll-card.jsx"></script>
<script type="text/babel" src="src/components/stat-bar.jsx"></script>
<script type="text/babel" src="src/components/music.jsx"></script>
<script type="text/babel" src="src/components/feedback.jsx"></script>
<script type="text/babel" src="src/components/candle-toggle.jsx"></script>

<!-- Visualizers (D3) -->
<script type="text/babel" src="src/visualizers/list-tracer.jsx"></script>
<script type="text/babel" src="src/visualizers/loop-tracer.jsx"></script>
<script type="text/babel" src="src/visualizers/class-tree.jsx"></script>

<!-- Puzzles -->
<script type="text/babel" src="src/puzzles/puzzle-types.jsx"></script>
<script type="text/babel" src="src/puzzles/d3-puzzle.jsx"></script>

<!-- Scenes -->
<script type="text/babel" src="src/components/ambience.jsx"></script>
<script type="text/babel" src="src/scenes/title-scene.jsx"></script>
<script type="text/babel" src="src/scenes/map-scene.jsx"></script>
<script type="text/babel" src="src/scenes/chapter-scene.jsx"></script>
<script type="text/babel" src="src/scenes/victory-scene.jsx"></script>

<!-- Root -->
<script type="text/babel" src="src/app.jsx"></script>
<script type="text/babel" data-presets="env,react">
  // Wait for all babel scripts to be transpiled and executed
  (function mount() {
    if (!window.App) { setTimeout(mount, 60); return; }
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  })();
</script>
</body>
</html>
